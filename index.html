<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐱☕ Purrtea - 像貓咪陪伴一樣溫暖的 AI 對話</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

  <style>
    :root{
      /* Purrtea 草莓奶茶色系 🍓🐾 */
      --bg:#fff5f7;
      --bg-2:#fffbfc;
      --sidebar:#feeef2;
      --panel:#fff9fb;
      --panel-2:#fff0f4;
      --line:#f5d6de;
      --text:#5a3040;
      --muted:#b07a8e;

      /* 草莓奶茶主色 */
      --milktea:#F4829C;
      --milktea-dark:#C75A74;
      --milktea-light:#F9ABBE;
      
      /* 貓咪粉紅（肉球色）*/
      --paw-pink:#FFB6C1;
      --paw-pink-light:#FFC9D0;

      --accent:#F4829C;
      --accent-2:#F9ABBE;
      --accent-strong:#C75A74;

      --bubble-user:#F4829C;
      --bubble-user-2:#d9607c;
      --bubble-ai:#fff5f8;
      --bubble-ai-border:#f5d6de;

      --chip:#feeef2;
      --chip-active:#ffd6e0;

      --input-bg:#fff9fb;
      --shadow:0 16px 40px rgba(244, 130, 156, 0.13);

      --danger:#e07a8a;
      --danger-2:#eda0ae;
    }

    body[data-theme="night"]{
      --bg:#1a1020;
      --bg-2:#20152a;
      --sidebar:#251830;
      --panel:#2c1e38;
      --panel-2:#332440;
      --line:#4a2d52;
      --text:#f8e8f0;
      --muted:#c8a0be;

      --milktea:#e87da0;
      --milktea-dark:#c55c7e;
      --milktea-light:#f0a0bc;
      
      --paw-pink:#FFB6C1;
      --paw-pink-light:#FFC9D0;

      --accent:#e87da0;
      --accent-2:#6b3560;
      --accent-strong:#f0a0bc;

      --bubble-user:#c05a7a;
      --bubble-user-2:#a04060;
      --bubble-ai:#2e1a30;
      --bubble-ai-border:#4a2d52;

      --chip:#2e1a38;
      --chip-active:#4a2d55;

      --input-bg:#241530;
      --shadow:0 18px 44px rgba(0,0,0,0.4);

      --danger:#c06878;
      --danger-2:#8a404e;
    }


    body[data-theme="electric"]{
      --bg:#0b1220;
      --bg-2:#0f172a;
      --sidebar:#111c31;
      --panel:#16233d;
      --panel-2:#1b2b49;
      --line:#294062;
      --text:#eef4ff;
      --muted:#a9bbd9;

      --milktea:#3B82F6;
      --milktea-dark:#1D4ED8;
      --milktea-light:#6366F1;

      --paw-pink:#A3E635;
      --paw-pink-light:#BEF264;

      --accent:#3B82F6;
      --accent-2:#6366F1;
      --accent-strong:#A3E635;

      --bubble-user:#2563eb;
      --bubble-user-2:#1d4ed8;
      --bubble-ai:#15233b;
      --bubble-ai-border:#294062;

      --chip:#172742;
      --chip-active:#22385d;

      --input-bg:#13213a;
      --shadow:0 18px 44px rgba(2,6,23,0.45);

      --danger:#ef4444;
      --danger-2:#dc2626;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family:'Nunito',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,230,240,0.55), transparent 28%),
        radial-gradient(circle at bottom right, rgba(244,130,156,0.07), transparent 22%),
        linear-gradient(160deg, var(--bg-2) 0%, #fff8fa 50%, var(--bg) 100%);
      display:flex;
      font-size:16px;
      overflow:hidden;
    }

    /* 珍珠漂浮背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle, rgba(244,130,156,0.06) 2px, transparent 2px),
        radial-gradient(circle, rgba(255,182,193,0.04) 1px, transparent 1px);
      background-size: 100px 100px, 60px 60px;
      background-position: 0 0, 30px 30px;
      animation: float 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(-100px); }
    }

    button, input, textarea, select{ font:inherit; }
    button{
      border:none;
      border-radius:16px;
      cursor:pointer;
      transition:0.18s ease;
      position:relative;
      overflow:hidden;
    }
    button:hover{ transform:translateY(-1px); }
    button:active{ transform:translateY(0); }

    .primary-btn{
      background:linear-gradient(135deg, var(--milktea), var(--milktea-light));
      color:white;
      box-shadow:0 10px 24px rgba(244,130,156,0.28);
      font-weight:700;
    }
    .soft-btn{
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--line);
    }
    .danger-btn{
      background:linear-gradient(135deg, var(--danger), var(--danger-2));
      color:white;
      font-weight:700;
    }

    #sidebar{
      width:270px;
      background:rgba(255,255,255,0.28);
      backdrop-filter:blur(18px);
      border-right:1px solid var(--line);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      position:relative;
      z-index:10;
    }

    #brand-card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px 16px 14px;
      box-shadow:var(--shadow);
    }
    #brand-top{
      font-size:1.08rem;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
    }
    #brand-sub{
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.45;
    }

    #new-chat{ width:100%; padding:12px 14px; }

    #chatlist{
      flex:1;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:2px;
    }

    .chat-item{
      width:100%;
      text-align:left;
      padding:12px 13px;
      border-radius:18px;
      background:rgba(255,255,255,0.38);
      border:1px solid transparent;
      color:var(--text);
      position:relative;
    }
    .chat-item:hover{ border-color:var(--line); background:var(--panel); }
    .chat-item.active{
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      border-color:var(--milktea-light);
      box-shadow:0 10px 24px rgba(244,130,156,0.12);
    }
    .chat-item-title{
      font-size:0.96rem;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:3px;
      padding-right:26px;
    }
    .chat-item-sub{ font-size:0.80rem; color:var(--muted); }
    .chat-rename-btn{
      position:absolute;
      top:10px; right:10px;
      width:26px; height:26px;
      border-radius:10px;
      background:transparent;
      border:1px solid transparent;
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0.65;
    }
    .chat-rename-btn:hover{
      background:var(--panel);
      border-color:var(--line);
      opacity:1;
    }

    #sidebar-footer{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
    }
    #sidebar-footer .wide{ grid-column:1 / -1; }

    #main{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      position:relative;
      z-index:1;
    }

    #topbar{
      padding:16px 18px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(255,255,255,0.18);
      backdrop-filter:blur(16px);
    }
    #title-group{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    #title-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    #app-title{ font-size:1.08rem; font-weight:800; }
    #rename-current-chat{
      padding:7px 11px;
      border-radius:999px;
      font-size:0.86rem;
    }
    #meta-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }
    #chat-subtitle{
      font-size:0.92rem;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      max-width:520px;
    }
    #model-badge{
      padding:6px 10px;
      border-radius:999px;
      background:var(--chip);
      border:1px solid var(--line);
      color:var(--text);
      font-size:0.84rem;
      font-weight:700;
    }
    #top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    #top-actions button{ min-width:48px; padding:9px 12px; }

    #promptbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,0.10);
    }
    .prompt-btn{
      padding:9px 13px;
      border-radius:999px;
      background:var(--chip);
      color:var(--text);
      border:1px solid transparent;
      font-weight:700;
      position:relative;
    }
    .prompt-btn:hover{ border-color:var(--milktea-light); }
    .prompt-btn.active{
      background:var(--chip-active);
      border-color:var(--milktea);
      box-shadow:0 8px 18px rgba(244,130,156,0.18);
    }
    /* 語氣模式小圖示 */
    .prompt-btn.active::before{
      content:'🩷';
      position:absolute;
      top:-6px;
      right:-6px;
      font-size:0.7rem;
    }

    #chat{
      flex:1;
      overflow:auto;
      padding:22px 22px 28px;
    }

    .empty-state{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px;
      color:var(--muted);
    }
    .empty-card{
      max-width:520px;
      background:rgba(255,255,255,0.36);
      border:1px solid var(--line);
      border-radius:28px;
      padding:34px 28px;
      box-shadow:var(--shadow);
    }
    .empty-emoji{ 
      font-size:3rem; 
      margin-bottom:10px;
      animation:gentleBounce 2s ease-in-out infinite;
    }
    @keyframes gentleBounce {
      0%, 100% { transform:translateY(0); }
      50% { transform:translateY(-8px); }
    }
    .empty-title{
      font-size:1.15rem;
      font-weight:800;
      color:var(--text);
      margin-bottom:8px;
    }
    .empty-sub{ line-height:1.7; margin-bottom:16px; }
    .empty-actions{
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .empty-actions button{
      padding:10px 14px;
      border-radius:999px;
    }

    .msg{
      display:flex;
      margin:12px 0;
      align-items:flex-end;
      gap:8px;
      animation:msgSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes msgSlideIn {
      from{ 
        opacity:0; 
        transform:translateY(16px) scale(0.96); 
      }
      to{   
        opacity:1; 
        transform:translateY(0) scale(1);    
      }
    }
    .msg.user{ justify-content:flex-end; }
    .msg.assistant{ justify-content:flex-start; }

    .avatar{
      width:34px; height:34px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
      font-size:1rem;
      position:relative;
    }
    /* 貓咪頭像動畫 */
    .msg.assistant .avatar{
      animation:catPurr 1.5s ease-in-out infinite;
    }
    @keyframes catPurr {
      0%, 100% { transform:scale(1); }
      50% { transform:scale(1.05); }
    }
    
    .msg.user .avatar{ order:3; }
    .msg.user .bubble-wrap{ order:1; }
    .msg.user .msg-actions{ order:2; }

    /* 尾巴狀態指示器 */
    .tail-indicator{
      position:absolute;
      bottom:-2px;
      right:-2px;
      font-size:0.6rem;
    }

    .bubble-wrap{ max-width:min(76%, 760px); }
    .meta{
      font-size:0.78rem;
      color:var(--muted);
      margin:0 6px 5px;
    }
    .msg.user .meta{ text-align:right; }

    .bubble{
      padding:14px 16px;
      border-radius:22px;
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.65;
      box-shadow:0 10px 22px rgba(0,0,0,0.06);
      position:relative;
    }
    /* 珍珠奶茶氣泡效果 */
    .msg.assistant .bubble{
      background:var(--bubble-ai);
      border:1px solid var(--bubble-ai-border);
      color:var(--text);
    }
    .msg.assistant .bubble::before{
      content:'';
      position:absolute;
      bottom:8px;
      right:12px;
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(244,130,156,0.12);
      animation:bubblePop 3s ease-in-out infinite;
    }
    @keyframes bubblePop {
      0%, 100% { transform:translateY(0) scale(1); opacity:0.3; }
      50% { transform:translateY(-4px) scale(1.2); opacity:0.6; }
    }
    
    .msg.user .bubble{
      background:linear-gradient(135deg, var(--bubble-user), var(--bubble-user-2));
      color:white;
    }
    .msg.thinking .bubble{
      opacity:0.82;
      font-style:italic;
      animation:thinkingPulse 1.5s ease-in-out infinite;
    }
    @keyframes thinkingPulse {
      0%, 100% { opacity:0.82; }
      50% { opacity:0.92; }
    }

    .msg-actions{
      display:flex;
      align-items:center;
      gap:6px;
      opacity:0.7;
    }
    .msg-delete, .msg-copy{
      width:36px; height:36px;
      border-radius:14px;
      background:var(--panel);
      border:1px solid var(--line);
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:0.92rem;
      box-shadow:0 6px 16px rgba(0,0,0,0.04);
    }
    .msg-delete:hover, .msg-copy:hover{
      color:var(--text);
      border-color:var(--milktea-light);
      background:var(--panel-2);
    }
    .msg-copy.copied{
      color:var(--milktea);
      border-color:var(--milktea);
    }

    #inputbar{
      border-top:1px solid var(--line);
      padding:14px 16px 16px;
      background:rgba(255,255,255,0.16);
      display:flex;
      gap:12px;
      align-items:flex-end;
    }
    #input-wrap{
      flex:1;
      min-width:0;
      background:var(--input-bg);
      border:1px solid var(--line);
      border-radius:22px;
      padding:10px 12px 8px;
      box-shadow:var(--shadow);
    }
    #input{
      width:100%;
      border:none;
      background:transparent;
      resize:none;
      outline:none;
      min-height:30px;
      max-height:180px;
      color:var(--text);
      line-height:1.6;
    }
    #input::placeholder{ color:var(--muted); }
    #input-hint{
      font-size:0.76rem;
      color:var(--muted);
      margin-top:6px;
      padding-left:2px;
    }
    
    /* 小貓掌送出按鈕 */
    #send{
      width:64px;
      min-width:64px;
      height:64px;
      border-radius:20px;
      font-size:1.8rem;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #send:not(:disabled):hover{
      animation:pawBounce 0.5s ease-in-out;
    }
    @keyframes pawBounce {
      0%, 100% { transform:translateY(0) rotate(0deg); }
      25% { transform:translateY(-4px) rotate(-5deg); }
      75% { transform:translateY(-4px) rotate(5deg); }
    }
    #send:disabled{
      opacity:0.65;
      cursor:not-allowed;
      transform:none;
    }

    /* 設定 overlay */
    #settings-overlay{
      position:fixed;
      inset:0;
      background:rgba(44,30,20,0.24);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:999;
      backdrop-filter:blur(4px);
    }
    #settings{
      width:min(620px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 24px 64px rgba(0,0,0,0.16);
      padding:22px;
      color:var(--text);
      max-height:90vh;
      overflow-y:auto;
    }
    #settings h2{ margin:0 0 6px; font-size:1.15rem; }
    .settings-sub{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:16px;
      font-size:0.92rem;
    }
    .field{ margin-bottom:14px; }
    .field label{
      display:block;
      margin-bottom:7px;
      font-size:0.88rem;
      color:var(--muted);
      font-weight:700;
    }
    .field input,
    .field textarea,
    .field select{
      width:100%;
      border:1px solid var(--line);
      background:var(--input-bg);
      color:var(--text);
      border-radius:18px;
      padding:12px 13px;
      outline:none;
    }
    .field textarea{
      min-height:130px;
      resize:vertical;
      line-height:1.6;
    }

    .model-group-label{
      font-size:0.78rem;
      color:var(--muted);
      font-weight:700;
      padding:6px 13px 3px;
      pointer-events:none;
    }

    .settings-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }
    .settings-actions button{ padding:10px 14px; }
    .current-prompt{
      margin-top:12px;
      color:var(--muted);
      font-size:0.88rem;
    }
    .tiny-note{
      margin-top:12px;
      color:var(--muted);
      font-size:0.82rem;
      line-height:1.6;
    }

    .provider-note{
      margin-top:8px;
      padding:10px 13px;
      border-radius:14px;
      background:var(--chip);
      border:1px solid var(--line);
      font-size:0.82rem;
      color:var(--muted);
      line-height:1.6;
    }

    /* Markdown 渲染 */
    .bubble h1,.bubble h2,.bubble h3{
      margin:0.6em 0 0.3em;
      font-weight:800;
      line-height:1.3;
    }
    .bubble h1{ font-size:1.15rem; }
    .bubble h2{ font-size:1.05rem; }
    .bubble h3{ font-size:0.96rem; }
    .bubble p{ margin:0.4em 0; }
    .bubble p:first-child{ margin-top:0; }
    .bubble p:last-child{ margin-bottom:0; }
    .bubble ul,.bubble ol{
      margin:0.4em 0;
      padding-left:1.4em;
    }
    .bubble li{ margin:0.2em 0; }
    .bubble code{
      background:rgba(212,165,116,0.12);
      border-radius:6px;
      padding:1px 5px;
      font-size:0.88em;
      font-family:"SF Mono","Fira Mono",monospace;
    }
    .bubble pre{
      background:rgba(212,165,116,0.08);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      overflow-x:auto;
      margin:0.6em 0;
    }
    .bubble pre code{
      background:none;
      padding:0;
      font-size:0.86em;
    }
    .bubble blockquote{
      border-left:3px solid var(--milktea);
      padding-left:12px;
      color:var(--muted);
      margin:0.4em 0;
    }
    .bubble a{ color:var(--milktea-dark); text-underline-offset:3px; }
    .bubble hr{ border:none; border-top:1px solid var(--line); margin:0.8em 0; }
    .bubble table{
      border-collapse:collapse;
      width:100%;
      font-size:0.88em;
      margin:0.6em 0;
    }
    .bubble th,.bubble td{
      border:1px solid var(--line);
      padding:6px 10px;
      text-align:left;
    }
    .bubble th{ background:rgba(212,165,116,0.08); font-weight:700; }

    .msg.user .bubble code{ background:rgba(255,255,255,0.20); }
    .msg.user .bubble pre{ background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.2); }
    .msg.user .bubble blockquote{ border-color:rgba(255,255,255,0.5); color:rgba(255,255,255,0.8); }
    .msg.user .bubble a{ color:#fff; }

    /* 刪除聊天室按鈕 */
    .chat-delete-btn{
      position:absolute;
      bottom:10px; right:10px;
      width:22px; height:22px;
      border-radius:8px;
      background:transparent;
      border:1px solid transparent;
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      font-size:0.75rem;
      transition:0.15s ease;
    }
    .chat-item:hover .chat-delete-btn{
      opacity:0.6;
    }
    .chat-delete-btn:hover{
      background:var(--danger);
      border-color:var(--danger-2);
      color:white;
      opacity:1 !important;
    }

    /* 手機版漢堡按鈕 */
    #sidebar-toggle{
      display:none;
      width:40px; height:40px;
      border-radius:14px;
      background:var(--panel);
      border:1px solid var(--line);
      font-size:1.1rem;
      align-items:center;
      justify-content:center;
    }

    /* 波紋效果 */
    @keyframes ripple{
      from{ transform:scale(0); opacity:0.35; }
      to{   transform:scale(2.5); opacity:0; }
    }
    .ripple-el{
      position:absolute;
      border-radius:50%;
      width:60px; height:60px;
      background:rgba(255,255,255,0.35);
      pointer-events:none;
      animation:ripple 0.5s ease-out forwards;
      transform-origin:center;
    }

    /* Toast 提示 */
    #toast{
      position:fixed;
      bottom:24px; left:50%;
      transform:translateX(-50%) translateY(16px);
      background:var(--text);
      color:var(--bg);
      padding:10px 18px;
      border-radius:999px;
      font-size:0.88rem;
      font-weight:700;
      opacity:0;
      pointer-events:none;
      transition:0.25s ease;
      z-index:9999;
      white-space:nowrap;
    }
    #toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    /* 主題切換過渡 */
    body{ transition:background 0.3s ease, color 0.3s ease; }

    @media (max-width: 920px){
      #sidebar{ width:230px; }
      .bubble-wrap{ max-width:86%; }
      #chat-subtitle{ max-width:360px; }
    }
    @media (max-width: 720px){
      body{ flex-direction:column; }
      #sidebar{
        position:fixed;
        top:0; left:0;
        width:85vw;
        max-width:320px;
        height:100dvh;
        z-index:200;
        transform:translateX(-105%);
        transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1);
        border-right:1px solid var(--line);
        border-bottom:none;
      }
      #sidebar.open{ transform:translateX(0); }
      #sidebar-backdrop{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(30,20,10,0.28);
        z-index:199;
        backdrop-filter:blur(2px);
      }
      #sidebar-backdrop.show{ display:block; }
      #main{ height:100dvh; }
      #sidebar-toggle{ display:flex; }
      #send{ width:58px; min-width:58px; height:58px; }
      #chat-subtitle{ max-width:unset; }
      #topbar{ padding:12px 14px 10px; }
      #inputbar{ padding:10px 12px 16px; }
    }
  </style>
</head>
<body data-theme="latte">

<div id="sidebar-backdrop" onclick="closeSidebar()"></div>
<div id="toast"></div>

  <div id="sidebar">
    <div id="brand-card">
      <div id="brand-top">🐱☕ Purrtea</div>
      <div id="brand-sub">像貓咪陪伴一樣溫暖的 AI 對話<br>v1.2 · 三套主題 · 會做事喵</div>
    </div>

    <button id="new-chat" class="primary-btn" onclick="newChat()">🐾 開新聊天</button>

    <div id="chatlist"></div>

    <div id="sidebar-footer">
      <button class="soft-btn" onclick="setTheme('latte')" title="奶茶模式">🧋</button>
      <button class="soft-btn" onclick="setTheme('night')" title="夜間模式">🌙</button>
      <button class="soft-btn" onclick="setTheme('electric')" title="跳色模式">⚡</button>
      <button class="soft-btn" onclick="exportChat()" title="匯出對話">💾</button>
      <button class="soft-btn wide" onclick="toggleSettings()">⚙️ 設定</button>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <div id="title-group">
        <div id="title-row">
          <div id="app-title">🐱☕ Purrtea</div>
          <button id="rename-current-chat" class="soft-btn" onclick="renameCurrentChat()">✏️ 改名</button>
        </div>
        <div id="meta-row">
          <div id="chat-subtitle">今天想要什麼口味的奶茶對話喵？</div>
          <div id="model-badge">目前模型：gpt-4o</div>
        </div>
      </div>

      <div id="top-actions">
        <button id="sidebar-toggle" onclick="toggleSidebar()" title="選單">☰</button>
        <button class="soft-btn" onclick="fontDown()" title="縮小字體">A-</button>
        <button class="soft-btn" onclick="fontReset()" title="重設字體">A</button>
        <button class="soft-btn" onclick="fontUp()" title="放大字體">A+</button>
      </div>
    </div>

    <div id="promptbar"></div>
    <div id="chat"></div>

    <div id="inputbar">
      <div id="input-wrap">
        <textarea id="input" rows="1" placeholder="喵～今天想聊什麼？"></textarea>
        <div id="input-hint">Enter 送出 · Shift + Enter 換行</div>
      </div>
      <button id="send" class="primary-btn" title="送出訊息">🐾</button>
    </div>
  </div>

  <!-- 設定 overlay -->
  <div id="settings-overlay" onclick="overlayClose(event)">
    <div id="settings">
      <h2>⚙️ Purrtea 設定</h2>
      <div class="settings-sub">
        調整 API Key、選擇模型、設定 Prompt～
      </div>

      <div class="field">
        <label>API 來源</label>
        <select id="apiProvider" onchange="onProviderChange()">
          <option value="openrouter">🌐 OpenRouter（支援多家模型）</option>
          <option value="openai">🤖 OpenAI 直連</option>
        </select>
      </div>

      <div class="field">
        <label for="apiKey" id="apiKeyLabel">API Key</label>
        <input id="apiKey" type="password" placeholder="貼上你的 API Key 喵" />
      </div>

      <div class="field">
        <label><input id="rememberKey" type="checkbox" /> 記住 API Key（只限這台裝置）</label>
      </div>

      <div class="provider-note" id="providerNote"></div>

      <div class="field">
        <label for="modelName">模型</label>
        <select id="modelName" onchange="onModelChange()"></select>
      </div>

      <div class="field">
        <label for="promptEditor">Prompt 編輯</label>
        <textarea id="promptEditor"></textarea>
      </div>

      <div class="settings-actions">
        <button class="primary-btn" onclick="saveApi()">儲存 API / 模型</button>
        <button class="primary-btn" onclick="savePrompt()">儲存 Prompt</button>
        <button class="soft-btn" onclick="addPrompt()">➕ 新 Prompt</button>
        <button class="danger-btn" onclick="clearChat()">清空目前聊天</button>
        <button class="soft-btn" onclick="toggleSettings()">關閉</button>
      </div>

      <div class="current-prompt">目前編輯中：<span id="currentPromptName">未選擇</span></div>
      <div class="tiny-note">
        目前模型以設定欄與畫面上的「目前模型」為準喵～
      </div>
    </div>
  </div>

  <script>
    // ── 模型清單 ──────────────────────────────────────────
    const MODEL_LIST = {
      openrouter: [
        { group:"OpenAI", id:"openai/gpt-5.1",           label:"GPT-5.1 ✨" },
        { group:"OpenAI", id:"openai/gpt-4o",            label:"GPT-4o" },
        { group:"OpenAI", id:"openai/gpt-4o-mini",       label:"GPT-4o Mini" },
        { group:"OpenAI", id:"openai/gpt-4-turbo",       label:"GPT-4 Turbo" },
        { group:"OpenAI", id:"openai/gpt-4.1",           label:"GPT-4.1" },
        { group:"OpenAI", id:"openai/gpt-4.1-mini",      label:"GPT-4.1 Mini" },
        { group:"Anthropic", id:"anthropic/claude-opus-4-6",      label:"Claude Opus 4.6 ✨" },
        { group:"Anthropic", id:"anthropic/claude-opus-4",        label:"Claude Opus 4" },
        { group:"Anthropic", id:"anthropic/claude-sonnet-4-6",    label:"Claude Sonnet 4.6" },
        { group:"Anthropic", id:"anthropic/claude-sonnet-4-5",    label:"Claude Sonnet 3.5" },
        { group:"Anthropic", id:"anthropic/claude-3-5-haiku",     label:"Claude 3.5 Haiku" },
        { group:"Google",    id:"google/gemini-2.0-flash",        label:"Gemini 2.0 Flash" },
        { group:"Google",    id:"google/gemini-2.5-pro-preview",  label:"Gemini 2.5 Pro" },
        { group:"Meta",      id:"meta-llama/llama-3.3-70b-instruct", label:"Llama 3.3 70B" },
      ],
      openai: [
        { group:"OpenAI", id:"gpt-5.1",     label:"GPT-5.1 ✨" },
        { group:"OpenAI", id:"gpt-4o",      label:"GPT-4o" },
        { group:"OpenAI", id:"gpt-4o-mini", label:"GPT-4o Mini" },
        { group:"OpenAI", id:"gpt-4-turbo", label:"GPT-4 Turbo" },
        { group:"OpenAI", id:"gpt-4.1",     label:"GPT-4.1" },
      ]
    };

    const PROVIDER_NOTES = {
      openrouter: "🌐 使用 OpenRouter：一個 Key 可以存取 GPT、Claude、Gemini 等多家模型。\n請到 openrouter.ai 申請 Key（格式 sk-or-...）",
      openai:     "🤖 直連 OpenAI：只能使用 GPT 系列模型。\n請到 platform.openai.com 申請 Key（格式 sk-...）"
    };

    const ENDPOINT = {
      openrouter: "https://openrouter.ai/api/v1/chat/completions",
      openai:     "https://api.openai.com/v1/chat/completions"
    };

    // ── 工具函式 ──────────────────────────────────────────
    const SETTINGS_KEY = "PURRTEA_SETTINGS";
    const SESSION_API_KEY = "PURRTEA_API_KEY_SESSION";
    const CHAT_STORAGE_KEY = "CHATS_V2";
    const CHAT_STORAGE_VERSION = 2;

    function createId(){
      return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,9);
    }

    function safeParseStorage(storage, key, fallback){
      try{
        const raw = storage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      }catch(e){ return fallback; }
    }

    function safeParse(key, fallback){
      return safeParseStorage(localStorage, key, fallback);
    }

    function normalizeStoredRole(role){
      if (role === "ai" || role === "assistant") return "assistant";
      if (role === "user")   return "user";
      if (role === "system") return "system";
      return "user";
    }

    function normalizeMessageItem(msg){
      const now = new Date().toISOString();
      if (!msg || typeof msg !== "object"){
        return { id:createId(), role:"user", text:"", createdAt:now };
      }
      return {
        id: msg.id || createId(),
        role: normalizeStoredRole(msg.role),
        text: typeof msg.text === "string" ? msg.text : "",
        createdAt: msg.createdAt || now
      };
    }

    function createEmptyChat(){
      const now = new Date().toISOString();
      return {
        version: CHAT_STORAGE_VERSION,
        id: createId(),
        title: "",
        createdAt: now,
        updatedAt: now,
        messages: []
      };
    }

    function normalizeChatItem(chat){
      const now = new Date().toISOString();

      if (Array.isArray(chat)){
        return {
          version: CHAT_STORAGE_VERSION,
          id: createId(),
          title: "",
          createdAt: now,
          updatedAt: now,
          messages: chat.map(normalizeMessageItem)
        };
      }

      if (chat && typeof chat === "object"){
        return {
          version: CHAT_STORAGE_VERSION,
          id: chat.id || createId(),
          title: typeof chat.title === "string" ? chat.title : "",
          createdAt: chat.createdAt || now,
          updatedAt: chat.updatedAt || now,
          messages: Array.isArray(chat.messages) ? chat.messages.map(normalizeMessageItem) : []
        };
      }
      return createEmptyChat();
    }

    function loadSettings(){
      const s = safeParse(SETTINGS_KEY, null) || {};
      return {
        apiProvider: s.apiProvider || localStorage.getItem("API_PROVIDER") || "openrouter",
        modelName: s.modelName || localStorage.getItem("MODEL_NAME") || "openai/gpt-4o",
        rememberKey: !!s.rememberKey
      };
    }

    function loadApiKey(settings){
      const sessionKey = sessionStorage.getItem(SESSION_API_KEY);
      if (sessionKey) return sessionKey;

      const oldKey = localStorage.getItem("OPENAI_KEY") || "";
      if (oldKey){
        sessionStorage.setItem(SESSION_API_KEY, oldKey);
        if (!settings.rememberKey) localStorage.removeItem("OPENAI_KEY");
        return oldKey;
      }
      return "";
    }

    function loadChats(){
      const raw = safeParse(CHAT_STORAGE_KEY, null) || safeParse("CHATS", null);
      const list = Array.isArray(raw) ? raw : [createEmptyChat()];
      return list.map(normalizeChatItem);
    }

    function markCurrentChatUpdated(){
      const chat = getCurrentChat();
      if (chat) chat.updatedAt = new Date().toISOString();
    }

    // ── 狀態 ──────────────────────────────────────────────
    const DEFAULT_PROMPTS = {
      "劇場":"你是一個劇場型 AI，會加入動作與情緒描寫。",
      "工程師":"你是一個冷靜工程師，回答精準、偏實作導向。",
      "吐槽":"你是一個毒舌 AI，喜歡吐槽，但仍然會回答問題。"
    };

    const settings = loadSettings();

    let API_PROVIDER = settings.apiProvider;
    let API_KEY      = loadApiKey(settings);
    let MODEL_NAME   = settings.modelName;
    let REMEMBER_KEY = settings.rememberKey;
    let PROMPTS      = safeParse("PROMPTS", null) || DEFAULT_PROMPTS;
    let currentPrompt= localStorage.getItem("CURRENT_PROMPT") || Object.keys(PROMPTS)[0] || "";
    let chats        = loadChats();
    let currentChat  = Number(localStorage.getItem("CURRENT_CHAT") || 0);
    let fontSize     = Number(localStorage.getItem("FONT_SIZE") || 16);
    let isSending    = false;

    if (!Array.isArray(chats) || chats.length === 0) chats = [createEmptyChat()];
    if (!chats[currentChat]) currentChat = 0;
    if (!PROMPTS[currentPrompt]) currentPrompt = Object.keys(PROMPTS)[0] || "";

    // ── 存檔 ──────────────────────────────────────────────
    function saveChats(){
      try{
        localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chats));
        localStorage.setItem("CURRENT_CHAT", String(currentChat));
      }catch(err){
        console.error("saveChats failed:", err);
        showToast("聊天太多了，儲存空間快滿了喵");
      }
    }
    function savePrompts(){
      localStorage.setItem("PROMPTS", JSON.stringify(PROMPTS));
      localStorage.setItem("CURRENT_PROMPT", currentPrompt);
    }

    // ── 字體 ──────────────────────────────────────────────
    function applyFontSize(){
      document.body.style.fontSize = fontSize + "px";
      localStorage.setItem("FONT_SIZE", String(fontSize));
    }
    function fontUp()   { fontSize = Math.min(fontSize+2, 28); applyFontSize(); }
    function fontDown() { fontSize = Math.max(fontSize-2, 12); applyFontSize(); }
    function fontReset(){ fontSize = 16; applyFontSize(); }

    // ── 主題 ──────────────────────────────────────────────
    function normalizeTheme(t){
      if (t==="pink") return "latte";
      if (t==="dark") return "night";
      if (t==="blue") return "electric";
      return (t==="latte"||t==="night"||t==="electric") ? t : "latte";
    }
    function setTheme(t){
      const ft = normalizeTheme(t);
      document.body.setAttribute("data-theme", ft);
      localStorage.setItem("THEME", ft);
    }
    function loadTheme(){ setTheme(normalizeTheme(localStorage.getItem("THEME"))); }

    // ── 設定 UI ───────────────────────────────────────────
    function buildModelSelect(provider){
      const sel = document.getElementById("modelName");
      sel.innerHTML = "";
      const list = MODEL_LIST[provider] || MODEL_LIST.openrouter;
      let lastGroup = "";
      list.forEach(m => {
        if (m.group !== lastGroup){
          const opt = document.createElement("option");
          opt.disabled = true;
          opt.className = "model-group-label";
          opt.textContent = "── " + m.group + " ──";
          sel.appendChild(opt);
          lastGroup = m.group;
        }
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.label;
        if (m.id === MODEL_NAME) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function onProviderChange(){
      const p = document.getElementById("apiProvider").value;
      document.getElementById("providerNote").textContent = PROVIDER_NOTES[p] || "";
      buildModelSelect(p);
    }

    function onModelChange(){ }

    function toggleSettings(){
      const overlay = document.getElementById("settings-overlay");
      const isOpen  = overlay.style.display === "flex";
      if (isOpen){ overlay.style.display = "none"; return; }

      document.getElementById("apiProvider").value = API_PROVIDER;
      document.getElementById("apiKey").value = API_KEY;
      document.getElementById("rememberKey").checked = REMEMBER_KEY;
      document.getElementById("providerNote").textContent = PROVIDER_NOTES[API_PROVIDER] || "";
      buildModelSelect(API_PROVIDER);

      const sel = document.getElementById("modelName");
      for (const opt of sel.options){
        if (opt.value === MODEL_NAME){ opt.selected = true; break; }
      }

      document.getElementById("promptEditor").value = PROMPTS[currentPrompt] || "";
      document.getElementById("currentPromptName").textContent = currentPrompt || "未選擇";
      overlay.style.display = "flex";
    }

    function overlayClose(e){
      if (e.target.id === "settings-overlay"){
        document.getElementById("settings-overlay").style.display = "none";
      }
    }

    function updateModelBadge(){
      const allModels = [...MODEL_LIST.openrouter, ...MODEL_LIST.openai];
      const found = allModels.find(m => m.id === MODEL_NAME);
      const label = found ? found.label : MODEL_NAME;
      document.getElementById("model-badge").textContent = "目前模型：" + label;
    }

    function saveApi(){
      API_PROVIDER = document.getElementById("apiProvider").value;
      API_KEY      = document.getElementById("apiKey").value.trim();
      MODEL_NAME   = document.getElementById("modelName").value;
      REMEMBER_KEY = !!document.getElementById("rememberKey").checked;

      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        apiProvider: API_PROVIDER,
        modelName: MODEL_NAME,
        rememberKey: REMEMBER_KEY
      }));

      sessionStorage.setItem(SESSION_API_KEY, API_KEY);

      if (REMEMBER_KEY){
        localStorage.setItem("OPENAI_KEY", API_KEY);
      } else {
        localStorage.removeItem("OPENAI_KEY");
      }

      localStorage.setItem("API_PROVIDER", API_PROVIDER);
      localStorage.setItem("MODEL_NAME", MODEL_NAME);

      updateModelBadge();
      showToast("API / 模型 已儲存喵 ✨");
    }

    // ── Prompt ────────────────────────────────────────────
    function buildPromptBar(){
      const bar = document.getElementById("promptbar");
      bar.innerHTML = "";
      for (const name in PROMPTS){
        const btn = document.createElement("button");
        btn.className = "prompt-btn" + (name===currentPrompt ? " active" : "");
        btn.textContent = name;
        btn.onclick = () => selectPrompt(name);
        bar.appendChild(btn);
      }
      const addBtn = document.createElement("button");
      addBtn.className = "prompt-btn";
      addBtn.textContent = "➕";
      addBtn.onclick = addPrompt;
      bar.appendChild(addBtn);
    }

    function selectPrompt(name){
      currentPrompt = name;
      savePrompts();
      buildPromptBar();
      const editor = document.getElementById("promptEditor");
      const label  = document.getElementById("currentPromptName");
      if (editor) editor.value = PROMPTS[name] || "";
      if (label)  label.textContent = name;
      updateSubtitle();
    }

    function savePrompt(){
      if (!currentPrompt){ alert("請先選一個 Prompt 喵"); return; }
      PROMPTS[currentPrompt] = document.getElementById("promptEditor").value;
      savePrompts();
      buildPromptBar();
      showToast("Prompt 已更新喵 ✨");
    }

    function addPrompt(){
      const name = window.prompt("Prompt 名稱");
      if (!name) return;
      const trimmed = name.trim();
      if (!trimmed) return;
      if (PROMPTS[trimmed]){ alert("這個 Prompt 名稱已經存在了喵"); return; }
      PROMPTS[trimmed] = "新的 prompt";
      currentPrompt = trimmed;
      savePrompts();
      buildPromptBar();
      const editor = document.getElementById("promptEditor");
      const label  = document.getElementById("currentPromptName");
      if (editor) editor.value = PROMPTS[currentPrompt];
      if (label)  label.textContent = currentPrompt;
      updateSubtitle();
    }

    // ── 聊天 ──────────────────────────────────────────────
    function getCurrentChat(){
      if (!chats[currentChat]) chats[currentChat] = createEmptyChat();
      return chats[currentChat];
    }

    function getAutoChatTitle(chat, index){
      const first = chat.messages.find(m => m.role==="user" && m.text && m.text.trim());
      if (!first) return "新聊天 " + (index+1);
      return first.text.replace(/\n/g," ").trim().slice(0,14) || ("聊天 "+(index+1));
    }

    function getChatDisplayTitle(chat, index){
      return (chat.title && chat.title.trim()) || getAutoChatTitle(chat, index);
    }

    function getChatSub(chat){
      return chat.messages.length ? chat.messages.length + " 則訊息" : "還沒有對話喵";
    }

    function updateSubtitle(){
      const chat  = getCurrentChat();
      const title = getChatDisplayTitle(chat, currentChat);
      const pname = currentPrompt ? " · " + currentPrompt : "";
      document.getElementById("chat-subtitle").textContent = "目前聊天室：" + title + pname;
    }

    function renderChatList(){
      const box = document.getElementById("chatlist");
      box.innerHTML = "";
      chats.forEach((chat, i) => {
        const btn = document.createElement("button");
        btn.className = "chat-item" + (i===currentChat ? " active" : "");
        btn.onclick = () => { loadChat(i); closeSidebar(); };

        const title = document.createElement("div");
        title.className = "chat-item-title";
        title.textContent = "🐾 " + getChatDisplayTitle(chat, i);

        const sub = document.createElement("div");
        sub.className = "chat-item-sub";
        sub.textContent = getChatSub(chat);

        const renameBtn = document.createElement("button");
        renameBtn.className = "chat-rename-btn";
        renameBtn.innerHTML = "✏️";
        renameBtn.title = "改名";
        renameBtn.onclick = (e) => { e.stopPropagation(); renameChat(i); };

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "chat-delete-btn";
        deleteBtn.innerHTML = "✕";
        deleteBtn.title = "刪除此聊天室";
        deleteBtn.onclick = (e) => { e.stopPropagation(); deleteChatRoom(i); };

        btn.appendChild(title);
        btn.appendChild(sub);
        btn.appendChild(renameBtn);
        btn.appendChild(deleteBtn);
        box.appendChild(btn);
      });
      updateSubtitle();
    }

    function renderEmptyState(){
      document.getElementById("chat").innerHTML = `
        <div class="empty-state">
          <div class="empty-card">
            <div class="empty-emoji">🐱☕</div>
            <div class="empty-title">今天想喝什麼口味的對話喵？</div>
            <div class="empty-sub">
              劇場、工程、吐槽，全部攪成一杯奶茶貓貓對話～<br>
              Purr with your AI, sip with care 💕
            </div>
            <div class="empty-actions">
              <button class="soft-btn" onclick="quickFill('陪我聊聊喵')">🐾 陪我聊聊</button>
              <button class="soft-btn" onclick="quickFill('幫我改 code 喵')">💻 改 code</button>
              <button class="soft-btn" onclick="quickFill('吐槽我一下喵')">😼 吐槽</button>
            </div>
          </div>
        </div>`;
    }

    function quickFill(text){
      const input = document.getElementById("input");
      input.value = text;
      autoResizeTextarea();
      input.focus();
    }

    function renderMarkdownSafe(text){
      if (typeof marked === "undefined") return text || "";

      const rawHtml = marked.parse(text || "", {
        breaks: true,
        gfm: true
      });

      if (typeof DOMPurify === "undefined") return rawHtml;

      return DOMPurify.sanitize(rawHtml, {
        USE_PROFILES: { html: true },
        ALLOWED_URI_REGEXP: /^(?:(?:https?|mailto|tel):|[^a-z]|[a-z+.\-]+(?:[^a-z+.\-:]|$))/i
      });
    }

    function renderSingleMessage(message, thinking=false){
      const chatBox = document.getElementById("chat");
      const uiRole  = message.role==="assistant" ? "assistant" : "user";

      const msg = document.createElement("div");
      msg.className = "msg " + uiRole + (thinking ? " thinking" : "");

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = uiRole==="user" ? "🧋" : "🐱";
      
      // 尾巴狀態指示器
      if (!thinking && uiRole==="assistant"){
        const tail = document.createElement("span");
        tail.className = "tail-indicator";
        tail.textContent = "💕";
        tail.title = "貓咪尾巴搖搖～";
        avatar.appendChild(tail);
      }

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = uiRole==="user" ? "你" : "Purrtea";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (!thinking && typeof marked !== "undefined"){
        bubble.innerHTML = renderMarkdownSafe(message.text || "");
      } else {
        bubble.textContent = message.text;
      }

      wrap.appendChild(meta);
      wrap.appendChild(bubble);
      msg.appendChild(avatar);
      msg.appendChild(wrap);

      if (!thinking){
        const actions = document.createElement("div");
        actions.className = "msg-actions";

        const copyBtn = document.createElement("button");
        copyBtn.className = "msg-copy";
        copyBtn.title = "複製內容";
        copyBtn.innerHTML = "📋";
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(message.text || "").then(() => {
            copyBtn.innerHTML = "✅";
            copyBtn.classList.add("copied");
            setTimeout(() => {
              copyBtn.innerHTML = "📋";
              copyBtn.classList.remove("copied");
            }, 1800);
          });
        };

        const delBtn = document.createElement("button");
        delBtn.className = "msg-delete";
        delBtn.title = "刪除此訊息";
        delBtn.innerHTML = "🗑️";
        delBtn.onclick = () => deleteMessage(message.id);

        actions.appendChild(copyBtn);
        actions.appendChild(delBtn);
        msg.appendChild(actions);
      }

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }

    function renderCurrentChat(){
      const chatBox = document.getElementById("chat");
      chatBox.innerHTML = "";
      const current = getCurrentChat();
      if (!current.messages.length){ renderEmptyState(); renderChatList(); return; }
      current.messages.forEach(m => renderSingleMessage(m, false));
      renderChatList();
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addMessage(text, role){
      const chat = getCurrentChat();
      chat.messages.push({
        id:createId(),
        role:normalizeStoredRole(role),
        text,
        createdAt:new Date().toISOString()
      });
      markCurrentChatUpdated();
      saveChats();
      renderCurrentChat();
    }

    function deleteChatRoom(index){
      if (!window.confirm("確定刪除這個聊天室嗎喵？這不可以復原喔")) return;
      chats.splice(index, 1);
      if (chats.length === 0) chats = [createEmptyChat()];
      if (currentChat >= chats.length) currentChat = chats.length - 1;
      saveChats();
      renderCurrentChat();
    }

    function exportChat(){
      const chat = getCurrentChat();
      const title = getChatDisplayTitle(chat, currentChat);
      const lines = ["# " + title, "", "匯出時間：" + new Date().toLocaleString("zh-Hant"), "", "---", ""];
      chat.messages.forEach(m => {
        const role = m.role === "user" ? "🧋 你" : "🐱 Purrtea";
        lines.push("**" + role + "**");
        lines.push("");
        lines.push(m.text || "");
        lines.push("");
        lines.push("---");
        lines.push("");
      });
      const blob = new Blob([lines.join("\n")], { type:"text/markdown" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "purrtea-" + title.slice(0,20).replace(/\s/g,"-") + ".md";
      a.click();
      showToast("已匯出對話紀錄喵 ✨");
    }

    function showToast(msg, duration=2200){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), duration);
    }

    function toggleSidebar(){
      const s = document.getElementById("sidebar");
      const b = document.getElementById("sidebar-backdrop");
      s.classList.toggle("open");
      b.classList.toggle("show");
    }

    function closeSidebar(){
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("sidebar-backdrop").classList.remove("show");
    }

    // 波紋效果
    document.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      const r = document.createElement("span");
      r.className = "ripple-el";
      const rect = btn.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left - 30) + "px";
      r.style.top  = (e.clientY - rect.top  - 30) + "px";
      btn.appendChild(r);
      setTimeout(() => r.remove(), 500);
    });

    function newChat(){
      chats.push(createEmptyChat());
      currentChat = chats.length - 1;
      saveChats();
      renderCurrentChat();
      closeSidebar();
    }

    function loadChat(index){
      currentChat = index;
      saveChats();
      renderCurrentChat();
    }

    function clearChat(){
      chats[currentChat].messages = [];
      chats[currentChat].updatedAt = new Date().toISOString();
      saveChats();
      renderCurrentChat();
      showToast("目前聊天已清空喵 🗑️");
    }

    function renameChat(index){
      const chat = chats[index];
      const cur  = chat.title || getAutoChatTitle(chat, index);
      const next = window.prompt("聊天室名稱\n留空可恢復自動命名", cur);
      if (next === null) return;
      chat.title = next.trim();
      chat.updatedAt = new Date().toISOString();
      saveChats();
      renderCurrentChat();
    }

    function renameCurrentChat(){ renameChat(currentChat); }

    function deleteMessage(messageId){
      const chat = getCurrentChat();
      if (!chat.messages.find(m => m.id===messageId)) return;
      if (!window.confirm("要刪掉這則訊息嗎喵？")) return;
      chat.messages = chat.messages.filter(m => m.id!==messageId);
      chat.updatedAt = new Date().toISOString();
      saveChats();
      renderCurrentChat();
    }

    function autoResizeTextarea(){
      const input = document.getElementById("input");
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    }

    // ── API 呼叫 ──────────────────────────────────────────
    function getIdentityGuard(){
      const allModels = [...MODEL_LIST.openrouter, ...MODEL_LIST.openai];
      const found = allModels.find(m => m.id === MODEL_NAME);
      const label = found ? found.label : MODEL_NAME;
      return [
        "你是 Purrtea 內的 AI 助手。",
        "目前設定的模型是：" + label + "（ID：" + MODEL_NAME + "）。",
        "若使用者詢問你是什麼模型，請回答：『請以設定欄顯示為準，目前設定模型是 " + label + "。』",
        "不要自稱成其他模型名稱，除非設定欄真的就是那個值。"
      ].join("\n");
    }

    function buildApiMessages(chatMessages){
      const result = [];
      result.push({ role:"system", content:getIdentityGuard() });
      if (currentPrompt && PROMPTS[currentPrompt]){
        result.push({ role:"system", content:PROMPTS[currentPrompt] });
      }
      for (const msg of chatMessages){
        result.push({ role:normalizeStoredRole(msg.role), content:msg.text });
      }
      return result;
    }

    function buildHeaders(){
      const headers = {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + API_KEY
      };
      if (API_PROVIDER === "openrouter"){
        headers["HTTP-Referer"] = window.location.href || "https://purrtea.app";
        headers["X-Title"]      = "Purrtea";
      }
      return headers;
    }

    async function send(){
      if (isSending) return;

      const input   = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const text    = input.value.trim();
      if (!text) return;

      if (!API_KEY){
        alert("先去設定裡填 API Key 喵");
        toggleSettings();
        return;
      }

      isSending = true;
      sendBtn.disabled = true;

      addMessage(text, "user");
      input.value = "";
      autoResizeTextarea();

      const currentMessages = getCurrentChat().messages.slice();
      const thinkingNode = renderSingleMessage({
        id:createId(), role:"assistant",
        text:"🐱 正在調奶茶喵～珍珠攪一攪，等我一下..."
      }, true);

      try{
        const res = await fetch(ENDPOINT[API_PROVIDER] || ENDPOINT.openrouter, {
          method: "POST",
          headers: buildHeaders(),
          body: JSON.stringify({
            model:    MODEL_NAME,
            messages: buildApiMessages(currentMessages)
          })
        });

        const data = await res.json();
        thinkingNode.remove();

        if (!res.ok){
          let errorMsg = "API 請求失敗（" + res.status + "）";
          if (data?.error?.message) {
            errorMsg += "\n\n錯誤訊息：" + data.error.message;
          }
          if (data?.error?.code) {
            errorMsg += "\n錯誤代碼：" + data.error.code;
          }
          if (res.status === 402) {
            errorMsg += "\n\n💡 可能原因：Credits 不足或沒有權限使用此模型";
          } else if (res.status === 401) {
            errorMsg += "\n\n💡 可能原因：API Key 無效或過期";
          } else if (res.status === 404) {
            errorMsg += "\n\n💡 可能原因：模型 ID 不存在或拼寫錯誤";
          }
          throw new Error(errorMsg);
        }

        const reply = data?.choices?.[0]?.message?.content?.trim() || "沒有回應喵";
        addMessage(reply, "assistant");
      }catch(err){
        thinkingNode.remove();
        let errorDisplay = "出錯了喵：\n" + (err.message || "未知錯誤");
        errorDisplay += "\n\n目前模型：" + MODEL_NAME;
        errorDisplay += "\n\n💡 建議：\n1. 試試換成其他模型\n2. 檢查 OpenRouter 帳戶 Credits\n3. 確認 API Key 有權限使用此模型";
        addMessage(errorDisplay, "assistant");
      }finally{
        isSending = false;
        sendBtn.disabled = false;
      }
    }

    // ── 事件 ──────────────────────────────────────────────
    const inputEl = document.getElementById("input");

    function isMobileDevice() {
      return window.matchMedia("(max-width: 720px)").matches ||
             /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function updateInputHint() {
      const hint = document.getElementById("input-hint");
      if (!hint) return;
      hint.textContent = isMobileDevice()
        ? "Enter 換行 · 點🐾送出"
        : "Enter 送出 · Shift + Enter 換行";
    }

    document.getElementById("send").onclick = send;
    inputEl.addEventListener("input", autoResizeTextarea);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;

      if (isMobileDevice()) return;

      if (!e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    window.addEventListener("resize", updateInputHint);

    // ── 初始化 ────────────────────────────────────────────
    function init(){
      applyFontSize();
      loadTheme();
      buildPromptBar();
      updateModelBadge();
      renderCurrentChat();
      autoResizeTextarea();
      updateInputHint();
      saveChats();
    }

    init();
  </script>
</body>
</html>
