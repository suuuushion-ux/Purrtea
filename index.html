<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🐈 whisper.ai v6.1</title>

<style>

:root{
--bg:#0b0b10;
--sidebar:#11111a;
--bubble-user:#8c7cff;
--bubble-ai:#2c2c3a;
--accent:#a594ff;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:white;
display:flex;
height:100vh;
}

body.pink{
--bg:#1a0f14;
--sidebar:#2a1a22;
--bubble-user:#ffb6d5;
--bubble-ai:#ffddee;
--accent:#ff9ac6;
}

#sidebar{
width:230px;
background:var(--sidebar);
border-right:1px solid #333;
display:flex;
flex-direction:column;
padding:10px;
}

#sidebar button{
margin-bottom:6px;
border:none;
border-radius:8px;
padding:6px;
background:var(--accent);
color:white;
cursor:pointer;
}

#chatlist{
flex:1;
overflow:auto;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#promptbar{
padding:10px;
border-bottom:1px solid #333;
}

#promptbar button{
margin-right:6px;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
}

.msg{
display:flex;
margin:8px 0;
}

.msg.user{
justify-content:flex-end;
}

.bubble{
padding:10px 14px;
border-radius:12px;
max-width:60%;
}

.msg.user .bubble{
background:var(--bubble-user);
}

.msg.ai .bubble{
background:var(--bubble-ai);
}

#inputbar{
display:flex;
padding:10px;
border-top:1px solid #333;
}

#input{
flex:1;
padding:8px;
border-radius:8px;
border:none;
}

#send{
margin-left:6px;
}

#settings{
position:fixed;
right:20px;
top:60px;
background:#1b1b26;
padding:20px;
border-radius:10px;
display:none;
width:300px;
}

textarea{
width:100%;
height:80px;
}

</style>
</head>

<body>

<div id="sidebar">

<button onclick="newChat()">➕ 新聊天</button>

<div id="chatlist"></div>

<button onclick="toggleTheme()">🧋主題</button>
<button onclick="toggleSettings()">⚙️ 設定</button>

</div>

<div id="main">

<div id="promptbar"></div>

<div id="chat"></div>

<div id="inputbar">

<input id="input" placeholder="喵～說點什麼">

<button id="send">🐾</button>

</div>

</div>

<div id="settings">

<div>OpenAI API Key</div>
<input id="apiKey" placeholder="sk-...">

<button onclick="saveApi()">儲存</button>

<hr>

<div>Prompt 編輯</div>

<textarea id="promptEditor"></textarea>

<button onclick="savePrompt()">儲存 Prompt</button>

</div>

<script>

let API_KEY = localStorage.getItem("OPENAI_KEY") || ""

let PROMPTS = JSON.parse(localStorage.getItem("PROMPTS")) || {
"劇場":"你是一個劇場型 AI。",
"工程師":"你是一個冷靜工程師。",
"吐槽":"你是一個毒舌 AI。"
}

let currentPrompt = ""

let chats = JSON.parse(localStorage.getItem("CHATS")) || []
let currentChat = 0

function saveApi(){

API_KEY=document.getElementById("apiKey").value

localStorage.setItem("OPENAI_KEY",API_KEY)

alert("API 已儲存")

}

function toggleSettings(){

let s=document.getElementById("settings")

s.style.display = s.style.display=="block"?"none":"block"

}

function toggleTheme(){

document.body.classList.toggle("pink")

}

function buildPromptBar(){

let bar=document.getElementById("promptbar")

bar.innerHTML=""

for(let name in PROMPTS){

let b=document.createElement("button")

b.textContent=name

b.onclick=()=>selectPrompt(name)

bar.appendChild(b)

}

let add=document.createElement("button")

add.textContent="➕"

add.onclick=addPrompt

bar.appendChild(add)

}

function selectPrompt(name){

currentPrompt=name

document.getElementById("promptEditor").value=PROMPTS[name]

}

function savePrompt(){

if(!currentPrompt)return

PROMPTS[currentPrompt]=document.getElementById("promptEditor").value

localStorage.setItem("PROMPTS",JSON.stringify(PROMPTS))

alert("Prompt 已更新")

}

function addPrompt(){

let name=prompt("Prompt 名稱")

if(!name)return

PROMPTS[name]="新的 prompt"

localStorage.setItem("PROMPTS",JSON.stringify(PROMPTS))

buildPromptBar()

}

function addMessage(text,role){

let chat=document.getElementById("chat")

let m=document.createElement("div")

m.className="msg "+role

let b=document.createElement("div")

b.className="bubble"

b.textContent=text

m.appendChild(b)

chat.appendChild(m)

chat.scrollTop=chat.scrollHeight

}

async function send(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

addMessage("🐈‍⬛ thinking...","ai")

let res=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:PROMPTS[currentPrompt]||""},
{role:"user",content:text}
]
})

})

let data=await res.json()

document.querySelector("#chat .msg:last-child").remove()

let reply=data.choices?.[0]?.message?.content || "沒有回應"

addMessage(reply,"ai")

}

document.getElementById("send").onclick=send

function newChat(){

chats.push([])

currentChat=chats.length-1

renderChatList()

document.getElementById("chat").innerHTML=""

}

function renderChatList(){

let box=document.getElementById("chatlist")

box.innerHTML=""

chats.forEach((c,i)=>{

let b=document.createElement("button")

b.textContent="聊天 "+(i+1)

b.onclick=()=>loadChat(i)

box.appendChild(b)

})

}

function loadChat(i){

currentChat=i

document.getElementById("chat").innerHTML=""

}

buildPromptBar()
renderChatList()

</script>

</body>
</html>
