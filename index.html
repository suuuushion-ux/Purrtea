<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>whisper.ai</title>

<style>
body{
 background:#0a0a0c;
 color:#fff;
 font-family:-apple-system,BlinkMacSystemFont;
 margin:0;
 display:flex;
 flex-direction:column;
 height:100vh;
 font-size:16px;
}

#topbar{
 display:flex;
 justify-content:space-between;
 padding:14px 18px;
 border-bottom:1px solid #2c2c38;
}

.title{
 font-weight:600;
}

#messages{
 flex:1;
 overflow-y:auto;
 padding:20px;
 display:flex;
 flex-direction:column;
 gap:14px;
}

.msg{
 display:flex;
 gap:10px;
}

.msg.user{
 flex-direction:row-reverse;
}

.bubble{
 padding:14px 18px;
 border-radius:22px;
 max-width:75%;
 backdrop-filter:blur(10px);
 box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.msg.ai .bubble{
 background:rgba(25,25,35,.7);
}

.msg.user .bubble{
 background:rgba(45,35,90,.75);
}

#inputbar{
 padding:12px;
 border-top:1px solid #2c2c38;
 display:flex;
 gap:8px;
}

#user-input{
 flex:1;
 padding:12px;
 border-radius:16px;
 border:none;
 background:#1c1c21;
 color:#fff;
}

#send-btn{
 width:44px;
 height:44px;
 border-radius:14px;
 border:none;
 font-size:20px;
 background:#a594f9;
 cursor:pointer;
}

#send-btn:active{
 transform:scale(.9);
}

#thinking-cat{
 position:fixed;
 left:10px;
 bottom:120px;
 font-size:32px;
 opacity:0;
 transition:opacity .2s;
}

#thinking-cat.show{
 opacity:1;
 animation:run 1s infinite;
}

@keyframes run{
 0%{transform:translateX(0)}
 50%{transform:translateX(6px)}
 100%{transform:translateX(0)}
}

#empty{
 text-align:center;
 margin-top:80px;
 opacity:.5;
}

.sleep{
 font-size:40px;
 animation:tail 3s infinite;
}

@keyframes tail{
 0%{transform:rotate(0)}
 50%{transform:rotate(5deg)}
 100%{transform:rotate(0)}
}
</style>
</head>

<body>

<div id="topbar">
<div class="title">whisper.ai</div>
<div>⚙️</div>
</div>

<div id="messages">

<div id="empty">
<div class="sleep">😼</div>
<p>等你說話喵</p>
</div>

</div>

<div id="thinking-cat">🐈‍⬛</div>

<div id="inputbar">
<input id="user-input" placeholder="說點什麼…" />
<button id="send-btn">🐾</button>
</div>

<script>

const messagesEl=document.getElementById("messages")
const input=document.getElementById("user-input")
const sendBtn=document.getElementById("send-btn")
const cat=document.getElementById("thinking-cat")

let history=[]

function modelCat(){
 return "🐈‍⬛"
}

function addMsg(role,text){

 const div=document.createElement("div")
 div.className="msg "+role

 const avatar=role==="user"?"😼":"🐱"

 div.innerHTML=
 "<div>"+avatar+"</div>"+
 "<div class='bubble'>"+text+"</div>"

 messagesEl.appendChild(div)

 messagesEl.scrollTop=messagesEl.scrollHeight
}

async function send(){

 const text=input.value.trim()
 if(!text) return

 document.getElementById("empty")?.remove()

 addMsg("user",text)

 history.push({role:"user",content:text})

 input.value=""

 cat.textContent=modelCat()
 cat.classList.add("show")

 const res=await fetch(
 "https://api.openai.com/v1/chat/completions",
 {
 method:"POST",
 headers:{
 "Content-Type":"application/json",
 "Authorization":"Bearer "+localStorage.getItem("OPENAI_KEY")
 },
 body:JSON.stringify({
 model:"gpt-4o",
 messages:history
 })
 }
 )

 const data=await res.json()

 cat.classList.remove("show")

 const reply=data.choices?.[0]?.message?.content || "（沒有回應）"

 addMsg("ai",reply)

 history.push({role:"assistant",content:reply})
}

sendBtn.onclick=send

input.addEventListener("keydown",e=>{
 if(e.key==="Enter"){
 e.preventDefault()
 send()
 }
})

if(!localStorage.getItem("OPENAI_KEY")){
 const key=prompt("輸入 OpenAI API key")
 if(key) localStorage.setItem("OPENAI_KEY",key)
}

</script>

</body>
</html>
