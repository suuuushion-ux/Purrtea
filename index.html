<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐈 whisper.ai v6.2</title>

<style>
:root{
  --bg:#0b0b10;
  --sidebar:#11111a;
  --panel:#151522;
  --panel-2:#1b1b26;
  --bubble-user:#8c7cff;
  --bubble-ai:#2c2c3a;
  --btn:#a594ff;
  --accent:#c8bfff;
  --divider:#2a2a35;
  --text:#ffffff;
  --muted:#bdbdd3;
  --danger:#ff7f9f;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
  font-size:16px;
}

body.pink{
  --bg:#1a0f14;
  --sidebar:#2a1a22;
  --panel:#23151c;
  --panel-2:#2c1822;
  --bubble-user:#ffb6d5;
  --bubble-ai:#ffddee;
  --btn:#ff9ac6;
  --accent:#ffd1e6;
  --divider:#3a2630;
  --text:#fff7fb;
  --muted:#f2cddd;
  --danger:#ff8cb1;
}

button{
  background:linear-gradient(135deg,var(--btn),var(--accent));
  border:none;
  border-radius:12px;
  padding:8px 10px;
  cursor:pointer;
  color:white;
  font-weight:600;
}

button:hover{
  opacity:0.95;
}

input, textarea{
  font:inherit;
}

#sidebar{
  width:240px;
  background:var(--sidebar);
  border-right:1px solid var(--divider);
  display:flex;
  flex-direction:column;
  padding:12px;
  gap:10px;
}

#brand{
  font-weight:800;
  padding:4px 2px 10px;
  border-bottom:1px solid var(--divider);
}

#sidebar-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

#chatlist{
  flex:1;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-right:2px;
}

.chat-item{
  width:100%;
  text-align:left;
  background:rgba(255,255,255,0.04);
  border:1px solid transparent;
  color:var(--text);
  padding:10px 12px;
  border-radius:12px;
  font-weight:500;
}

.chat-item.active{
  border-color:var(--accent);
  box-shadow:0 0 0 1px rgba(255,255,255,0.08) inset;
}

.sidebar-bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding-top:8px;
  border-top:1px solid var(--divider);
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

#topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 18px;
  border-bottom:1px solid var(--divider);
  background:rgba(255,255,255,0.02);
  gap:12px;
}

#title-wrap{
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width:0;
}

#app-title{
  font-weight:800;
}

#chat-subtitle{
  color:var(--muted);
  font-size:0.92em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#controls{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

#promptbar{
  padding:10px 14px;
  border-bottom:1px solid var(--divider);
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  background:rgba(255,255,255,0.01);
}

.prompt-btn{
  background:rgba(255,255,255,0.06);
  color:var(--text);
  border:1px solid transparent;
}

.prompt-btn.active{
  background:linear-gradient(135deg,var(--btn),var(--accent));
  border-color:rgba(255,255,255,0.18);
}

#chat{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  margin:10px 0;
  display:flex;
}

.msg.user{
  justify-content:flex-end;
}

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:min(75%,720px);
  white-space:pre-wrap;
  word-break:break-word;
  line-height:1.5;
}

.msg.user .bubble{
  background:var(--bubble-user);
}

.msg.ai .bubble{
  background:var(--bubble-ai);
}

body.pink .msg.ai .bubble{
  color:#4d2140;
}

#inputbar{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--divider);
}

#input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  background:white;
  color:#111;
}

#send{
  min-width:64px;
}

#settings{
  position:fixed;
  right:20px;
  top:70px;
  background:var(--panel-2);
  border:1px solid var(--divider);
  padding:18px;
  border-radius:14px;
  display:none;
  width:min(360px, calc(100vw - 40px));
  z-index:99;
  box-shadow:0 18px 60px rgba(0,0,0,0.35);
}

.settings-title{
  font-size:1.05rem;
  font-weight:800;
  margin-bottom:12px;
}

.settings-group{
  margin-bottom:14px;
}

.settings-group label{
  display:block;
  margin-bottom:6px;
  font-size:0.92em;
  color:var(--muted);
}

#settings input,
#settings textarea{
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px;
  background:#f5f5f8;
  color:#111;
}

#settings textarea{
  min-height:110px;
  resize:vertical;
}

.settings-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.danger{
  background:linear-gradient(135deg,var(--danger),#ffb3c9);
}

.small-note{
  color:var(--muted);
  font-size:0.86em;
  line-height:1.45;
}

hr{
  border:none;
  border-top:1px solid var(--divider);
  margin:14px 0;
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="brand">🐈 whisper.ai</div>

  <div id="sidebar-actions">
    <button onclick="newChat()">➕ 新聊天</button>
    <button onclick="toggleSettings()">⚙️ 設定</button>
  </div>

  <div id="chatlist"></div>

  <div class="sidebar-bottom">
    <button onclick="setTheme('dark')">🌙 深色</button>
    <button onclick="setTheme('pink')">🧋 粉色</button>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div id="title-wrap">
      <div id="app-title">🐈 whisper.ai v6.2</div>
      <div id="chat-subtitle">喵～工程版，貓毛有撿回來</div>
    </div>

    <div id="controls">
      <button onclick="fontDown()">A-</button>
      <button onclick="fontReset()">A</button>
      <button onclick="fontUp()">A+</button>
    </div>
  </div>

  <div id="promptbar"></div>

  <div id="chat"></div>

  <div id="inputbar">
    <input id="input" placeholder="喵～說點什麼" />
    <button id="send">🐾</button>
  </div>
</div>

<div id="settings">
  <div class="settings-title">⚙️ whisper 設定</div>

  <div class="settings-group">
    <label for="apiKey">OpenAI API Key</label>
    <input id="apiKey" placeholder="sk-..." />
  </div>

  <div class="settings-group">
    <label for="modelName">Model</label>
    <input id="modelName" placeholder="gpt-4o-mini" />
  </div>

  <div class="settings-group">
    <label for="promptEditor">Prompt 編輯</label>
    <textarea id="promptEditor"></textarea>
  </div>

  <div class="settings-row">
    <button onclick="saveApi()">儲存 API / Model</button>
    <button onclick="savePrompt()">儲存 Prompt</button>
    <button onclick="addPrompt()">➕ 新 Prompt</button>
  </div>

  <hr />

  <div class="settings-row">
    <button class="danger" onclick="clearChat()">清空目前聊天</button>
    <button onclick="toggleSettings()">關閉</button>
  </div>

  <p class="small-note">
    目前編輯的是：<span id="currentPromptName">未選擇</span>
  </p>
</div>

<script>
const DEFAULT_PROMPTS = {
  "劇場":"你是一個劇場型 AI，會加入動作與情緒描寫。",
  "工程師":"你是一個冷靜工程師，回答精準、實作導向。",
  "吐槽":"你是一個毒舌 AI，喜歡吐槽，但仍會回答問題。"
};

let API_KEY = localStorage.getItem("OPENAI_KEY") || "";
let MODEL_NAME = localStorage.getItem("MODEL_NAME") || "gpt-4o-mini";
let PROMPTS = JSON.parse(localStorage.getItem("PROMPTS") || "null") || DEFAULT_PROMPTS;
let currentPrompt = localStorage.getItem("CURRENT_PROMPT") || Object.keys(PROMPTS)[0] || "";
let chats = JSON.parse(localStorage.getItem("CHATS") || "null") || [[]];
let currentChat = Number(localStorage.getItem("CURRENT_CHAT") || 0);
let fontSize = Number(localStorage.getItem("FONT_SIZE") || 16);
let isSending = false;

if (!Array.isArray(chats) || chats.length === 0) chats = [[]];
if (!chats[currentChat]) currentChat = 0;
if (!PROMPTS[currentPrompt]) currentPrompt = Object.keys(PROMPTS)[0] || "";

function saveChats(){
  localStorage.setItem("CHATS", JSON.stringify(chats));
  localStorage.setItem("CURRENT_CHAT", String(currentChat));
}

function savePrompts(){
  localStorage.setItem("PROMPTS", JSON.stringify(PROMPTS));
  localStorage.setItem("CURRENT_PROMPT", currentPrompt);
}

function applyFontSize(){
  document.body.style.fontSize = fontSize + "px";
  localStorage.setItem("FONT_SIZE", String(fontSize));
}

function fontUp(){
  fontSize = Math.min(fontSize + 2, 28);
  applyFontSize();
}

function fontDown(){
  fontSize = Math.max(fontSize - 2, 12);
  applyFontSize();
}

function fontReset(){
  fontSize = 16;
  applyFontSize();
}

function setTheme(name){
  document.body.classList.remove("pink");
  if (name === "pink") document.body.classList.add("pink");
  localStorage.setItem("THEME", name);
}

function loadTheme(){
  const t = localStorage.getItem("THEME");
  if (t === "pink") document.body.classList.add("pink");
}

function toggleSettings(){
  const s = document.getElementById("settings");
  const isOpen = s.style.display === "block";

  if (isOpen){
    s.style.display = "none";
    return;
  }

  document.getElementById("apiKey").value = API_KEY;
  document.getElementById("modelName").value = MODEL_NAME;
  document.getElementById("promptEditor").value = PROMPTS[currentPrompt] || "";
  document.getElementById("currentPromptName").textContent = currentPrompt || "未選擇";
  s.style.display = "block";
}

function saveApi(){
  API_KEY = document.getElementById("apiKey").value.trim();
  MODEL_NAME = document.getElementById("modelName").value.trim() || "gpt-4o-mini";
  localStorage.setItem("OPENAI_KEY", API_KEY);
  localStorage.setItem("MODEL_NAME", MODEL_NAME);
  alert("API / Model 已儲存");
}

function buildPromptBar(){
  const bar = document.getElementById("promptbar");
  bar.innerHTML = "";

  for (const name in PROMPTS){
    const b = document.createElement("button");
    b.className = "prompt-btn" + (name === currentPrompt ? " active" : "");
    b.textContent = name;
    b.onclick = () => selectPrompt(name);
    bar.appendChild(b);
  }

  const add = document.createElement("button");
  add.textContent = "➕";
  add.onclick = addPrompt;
  bar.appendChild(add);
}

function selectPrompt(name){
  currentPrompt = name;
  savePrompts();
  buildPromptBar();
  document.getElementById("promptEditor").value = PROMPTS[name] || "";
  document.getElementById("currentPromptName").textContent = name;
}

function savePrompt(){
  if (!currentPrompt){
    alert("請先選一個 Prompt");
    return;
  }

  PROMPTS[currentPrompt] = document.getElementById("promptEditor").value;
  savePrompts();
  buildPromptBar();
  alert("Prompt 已更新");
}

function addPrompt(){
  const name = prompt("Prompt 名稱");
  if (!name) return;

  if (PROMPTS[name]){
    alert("這個 Prompt 名稱已存在");
    return;
  }

  PROMPTS[name] = "新的 prompt";
  currentPrompt = name;
  savePrompts();
  buildPromptBar();
  document.getElementById("promptEditor").value = PROMPTS[name];
  document.getElementById("currentPromptName").textContent = name;
}

function getCurrentChat(){
  if (!chats[currentChat]) chats[currentChat] = [];
  return chats[currentChat];
}

function getChatTitle(chat, index){
  const firstUser = chat.find(m => m.role === "user" && m.text?.trim());
  if (firstUser){
    return firstUser.text.trim().slice(0, 14);
  }
  return "聊天 " + (index + 1);
}

function updateSubtitle(){
  const title = getChatTitle(getCurrentChat(), currentChat);
  document.getElementById("chat-subtitle").textContent = title;
}

function renderChatList(){
  const box = document.getElementById("chatlist");
  box.innerHTML = "";

  chats.forEach((chat, i) => {
    const b = document.createElement("button");
    b.className = "chat-item" + (i === currentChat ? " active" : "");
    b.textContent = getChatTitle(chat, i);
    b.onclick = () => loadChat(i);
    box.appendChild(b);
  });

  updateSubtitle();
}

function renderMessage(text, role){
  const chat = document.getElementById("chat");

  const m = document.createElement("div");
  m.className = "msg " + role;

  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;

  m.appendChild(b);
  chat.appendChild(m);
  chat.scrollTop = chat.scrollHeight;

  return m;
}

function renderCurrentChat(){
  const chatBox = document.getElementById("chat");
  chatBox.innerHTML = "";

  getCurrentChat().forEach(msg => {
    renderMessage(msg.text, msg.role);
  });

  updateSubtitle();
}

function addMessage(text, role){
  getCurrentChat().push({ role, text });
  saveChats();
  renderMessage(text, role);
  renderChatList();
}

function newChat(){
  chats.push([]);
  currentChat = chats.length - 1;
  saveChats();
  renderChatList();
  renderCurrentChat();
}

function loadChat(i){
  currentChat = i;
  saveChats();
  renderChatList();
  renderCurrentChat();
}

function clearChat(){
  chats[currentChat] = [];
  saveChats();
  renderChatList();
  renderCurrentChat();
}

async function send(){
  if (isSending) return;

  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  if (!API_KEY){
    alert("先去設定裡填 API Key 喵");
    toggleSettings();
    return;
  }

  isSending = true;
  addMessage(text, "user");
  input.value = "";

  const thinkingNode = renderMessage("🐈‍⬛💭 thinking...", "ai");

  try{
    const messages = [];

    if (currentPrompt && PROMPTS[currentPrompt]){
      messages.push({
        role: "system",
        content: PROMPTS[currentPrompt]
      });
    }

    for (const msg of getCurrentChat()){
      messages.push({
        role: msg.role,
        content: msg.text
      });
    }

    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: MODEL_NAME,
        messages
      })
    });

    const data = await res.json();

    thinkingNode.remove();

    if (!res.ok){
      throw new Error(data?.error?.message || "API 請求失敗");
    }

    const reply = data?.choices?.[0]?.message?.content || "沒有回應";
    addMessage(reply, "ai");
  }catch(err){
    thinkingNode.remove();
    addMessage("出錯了喵：\n" + (err.message || "未知錯誤"), "ai");
  }finally{
    isSending = false;
  }
}

document.getElementById("send").onclick = send;

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

function init(){
  applyFontSize();
  loadTheme();

  if (!Array.isArray(chats) || chats.length === 0){
    chats = [[]];
  }

  if (!PROMPTS[currentPrompt]){
    currentPrompt = Object.keys(PROMPTS)[0] || "";
  }

  buildPromptBar();
  renderChatList();
  renderCurrentChat();

  document.getElementById("apiKey").value = API_KEY;
  document.getElementById("modelName").value = MODEL_NAME;
  document.getElementById("promptEditor").value = PROMPTS[currentPrompt] || "";
  document.getElementById("currentPromptName").textContent = currentPrompt || "未選擇";
}

init();
</script>

</body>
</html>
