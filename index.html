<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>🐈 whisper.ai</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
display:flex;
flex-direction:column;
height:100vh;
font-size:16px;
line-height:1.6;
letter-spacing:.02em;
font-variant-east-asian:traditional;
}

/* THEMES */

body.dark{
--bg:#0b0b10;
--userBubble:rgba(120,100,255,.65);
--aiBubble:rgba(40,40,55,.7);
--btn:#a594ff;
--accent:#c8bfff;
--divider:#2a2a35;
}

body.pink{
--bg:#1a0f14;
--userBubble:#ffb6d5;
--aiBubble:#ffddee;
--btn:#ff9ac6;
--accent:#ffd1e6;
--divider:#3a2630;
}

body{
background:var(--bg);
color:white;
}

/* TOPBAR */

#topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-bottom:1px solid var(--divider);
}

.title{
font-weight:600;
}

.controls button{
background:#1c1c25;
border:none;
color:white;
border-radius:6px;
padding:4px 8px;
margin-right:4px;
cursor:pointer;
}

/* PROMPTS */

#promptBar{
padding:8px 12px;
border-bottom:1px solid var(--divider);
display:flex;
gap:8px;
flex-wrap:wrap;
}

.promptBtn{
background:var(--btn);
border:none;
border-radius:10px;
padding:4px 10px;
cursor:pointer;
font-size:13px;
}

/* CHAT */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{
display:flex;
gap:10px;
}

.msg.user{
flex-direction:row-reverse;
}

.bubble{
padding:14px 18px;
border-radius:26px;
max-width:75%;
backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.msg.user .bubble{
background:var(--userBubble);
}

.msg.ai .bubble{
background:var(--aiBubble);
}

/* INPUT */

#inputbar{
padding:12px;
border-top:1px solid var(--divider);
display:flex;
gap:8px;
}

#user-input{
flex:1;
padding:12px;
border-radius:16px;
border:none;
background:#1c1c25;
color:white;
font-size:15px;
}

#send-btn{
width:44px;
height:44px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,var(--btn),var(--accent));
font-size:20px;
cursor:pointer;
}

/* THINKING CAT */

#thinking-cat{
position:fixed;
left:12px;
bottom:110px;
font-size:34px;
opacity:0;
}

#thinking-cat.show{
opacity:1;
animation:run 1s infinite;
}

@keyframes run{
0%{transform:translateX(0)}
50%{transform:translateX(10px)}
100%{transform:translateX(0)}
}

/* EMPTY */

#empty{
text-align:center;
margin-top:80px;
opacity:.6;
}

/* SETTINGS */

#settingsModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

#settingsCard{
background:#16161f;
padding:20px;
border-radius:16px;
width:320px;
display:flex;
flex-direction:column;
gap:10px;
}

#settingsCard input,
#settingsCard textarea{
background:#1f1f2b;
border:none;
padding:8px;
color:white;
border-radius:8px;
}

#settingsCard button{
padding:10px;
border:none;
border-radius:10px;
background:#9b8cff;
cursor:pointer;
}

</style>
</head>

<body>

<div id="topbar">

<div class="title">🐈 whisper.ai</div>

<div class="controls">

<button onclick="fontDown()">A-</button>
<button onclick="fontReset()">A</button>
<button onclick="fontUp()">A+</button>

<button onclick="setTheme('dark')">🌙</button>
<button onclick="setTheme('pink')">🧋</button>

<button onclick="openSettings()">⚙️</button>

</div>

</div>

<div id="promptBar"></div>

<div id="messages">

<div id="empty">

<div style="font-size:44px">😼</div>

<p>等你說話喵</p>

<div>🌸 🌸 🌸</div>

</div>

</div>

<div id="thinking-cat">🐈‍⬛🐟</div>

<div id="inputbar">

<input id="user-input" placeholder="跟貓聊點什麼喵…">

<button id="send-btn">🐾</button>

</div>

<div id="settingsModal">

<div id="settingsCard">

<h3>設定</h3>

<label>API Key</label>
<input id="apiKey">

<label>Model</label>
<input id="model">

<label>編輯 Prompt</label>
<textarea id="promptEdit"></textarea>

<button onclick="saveSettings()">儲存</button>
<button onclick="exportChat()">匯出聊天</button>
<button onclick="closeSettings()">關閉</button>

</div>

</div>

<script>

const messagesEl=document.getElementById("messages")
const input=document.getElementById("user-input")
const sendBtn=document.getElementById("send-btn")
const cat=document.getElementById("thinking-cat")
const promptBar=document.getElementById("promptBar")

let history=JSON.parse(localStorage.getItem("CHAT_HISTORY")||"[]")

let prompts=JSON.parse(localStorage.getItem("PROMPTS")||`{
"🎭劇場":"你是一個劇場型 AI",
"🛠工程師":"你是一個冷靜工程師",
"😈吐槽":"你是一個毒舌 AI"
}`)

let activePrompt=localStorage.getItem("ACTIVE_PROMPT")||Object.keys(prompts)[0]

function renderPrompts(){

promptBar.innerHTML=""

Object.keys(prompts).forEach(name=>{

const btn=document.createElement("button")
btn.className="promptBtn"
btn.textContent=name

btn.onclick=()=>{

activePrompt=name
localStorage.setItem("ACTIVE_PROMPT",name)

}

promptBar.appendChild(btn)

})

}

function addMsg(role,text,save=true){

document.getElementById("empty")?.remove()

const div=document.createElement("div")

div.className="msg "+role

const avatar=role==="user"?"😼":"🐱"

div.innerHTML="<div>"+avatar+"</div><div class='bubble'>"+text+"</div>"

messagesEl.appendChild(div)

messagesEl.scrollTop=messagesEl.scrollHeight

if(save){

history.push({role,content:text})

localStorage.setItem("CHAT_HISTORY",JSON.stringify(history))

}

}

async function send(){

const text=input.value.trim()

if(!text)return

addMsg("user",text)

input.value=""

sendBtn.textContent="🐾✨"

setTimeout(()=>sendBtn.textContent="🐾",200)

cat.classList.add("show")

const model=localStorage.getItem("MODEL")||"gpt-4o"

const messages=[

{role:"system",content:prompts[activePrompt]},

...history

]

const res=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("OPENAI_KEY")
},

body:JSON.stringify({
model,
messages
})

})

const data=await res.json()

cat.classList.remove("show")

const reply=data.choices?.[0]?.message?.content||"（沒有回應）"

addMsg("assistant",reply)

}

sendBtn.onclick=send

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
send()
}
})

function setTheme(name){

document.body.classList.remove("dark","pink")

document.body.classList.add(name)

localStorage.setItem("THEME",name)

}

function loadTheme(){

let theme=localStorage.getItem("THEME")||"dark"

document.body.classList.add(theme)

}

function openSettings(){

document.getElementById("settingsModal").style.display="flex"

document.getElementById("apiKey").value=localStorage.getItem("OPENAI_KEY")||""

document.getElementById("model").value=localStorage.getItem("MODEL")||"gpt-4o"

document.getElementById("promptEdit").value=prompts[activePrompt]

}

function closeSettings(){

document.getElementById("settingsModal").style.display="none"

}

function saveSettings(){

localStorage.setItem("OPENAI_KEY",document.getElementById("apiKey").value)

localStorage.setItem("MODEL",document.getElementById("model").value)

prompts[activePrompt]=document.getElementById("promptEdit").value

localStorage.setItem("PROMPTS",JSON.stringify(prompts))

}

function exportChat(){

const blob=new Blob([JSON.stringify(history,null,2)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="chat.json"

a.click()

}

let fontSize=localStorage.getItem("FONT_SIZE")||16

document.body.style.fontSize=fontSize+"px"

function fontUp(){fontSize++;applyFont()}

function fontDown(){fontSize--;applyFont()}

function fontReset(){fontSize=16;applyFont()}

function applyFont(){

document.body.style.fontSize=fontSize+"px"

localStorage.setItem("FONT_SIZE",fontSize)

}

loadTheme()

renderPrompts()

</script>

</body>
</html>
