<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>🐈 whisper.ai</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b10;
color:white;
font-family:
"Noto Sans TC",
-apple-system,
BlinkMacSystemFont,
"PingFang TC",
"Microsoft JhengHei",
sans-serif;
display:flex;
flex-direction:column;
height:100vh;
font-size:16px;
line-height:1.6;
letter-spacing:.02em;
font-variant-east-asian:traditional;
}

#topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-bottom:1px solid #2a2a35;
}

.title{
font-weight:600;
}

.font-controls button{
background:#1c1c25;
border:none;
color:white;
border-radius:6px;
padding:4px 8px;
margin-right:4px;
cursor:pointer;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{
display:flex;
gap:10px;
}

.msg.user{
flex-direction:row-reverse;
}

.bubble{
padding:14px 18px;
border-radius:26px;
max-width:75%;
backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.msg.user .bubble{
background:rgba(120,100,255,.65);
}

.msg.ai .bubble{
background:rgba(40,40,55,.7);
}

#inputbar{
padding:12px;
border-top:1px solid #2a2a35;
display:flex;
gap:8px;
}

#user-input{
flex:1;
padding:12px;
border-radius:16px;
border:none;
background:#1c1c25;
color:white;
font-size:15px;
}

#send-btn{
width:44px;
height:44px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#a594ff,#c8bfff);
font-size:20px;
cursor:pointer;
}

#send-btn:active{
transform:scale(.9);
}

#thinking-cat{
position:fixed;
left:12px;
bottom:110px;
font-size:34px;
opacity:0;
}

#thinking-cat.show{
opacity:1;
animation:run 1s infinite;
}

@keyframes run{
0%{transform:translateX(0)}
50%{transform:translateX(10px)}
100%{transform:translateX(0)}
}

#empty{
text-align:center;
margin-top:80px;
opacity:.6;
}

.sleep{
font-size:44px;
animation:tail 3s infinite;
}

@keyframes tail{
0%{transform:rotate(0)}
50%{transform:rotate(6deg)}
100%{transform:rotate(0)}
}

#settingsModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

#settingsCard{
background:#16161f;
padding:20px;
border-radius:16px;
width:320px;
display:flex;
flex-direction:column;
gap:10px;
}

#settingsCard input,
#settingsCard textarea{
background:#1f1f2b;
border:none;
padding:8px;
color:white;
border-radius:8px;
}

#settingsCard button{
padding:10px;
border:none;
border-radius:10px;
background:#9b8cff;
cursor:pointer;
}

</style>
</head>

<body>

<div id="topbar">

<div class="title">🐈 whisper.ai</div>

<div class="font-controls">

<button onclick="fontDown()">A-</button>
<button onclick="fontReset()">A</button>
<button onclick="fontUp()">A+</button>

<span onclick="openSettings()">⚙️</span>

</div>

</div>

<div id="messages">

<div id="empty">

<div class="sleep">😼</div>

<p>等你說話喵</p>

<div>🐟</div>

</div>

</div>

<div id="thinking-cat">🐈‍⬛</div>

<div id="inputbar">

<input id="user-input" placeholder="跟貓聊點什麼喵…">

<button id="send-btn">🐾</button>

</div>

<div id="settingsModal">

<div id="settingsCard">

<h3>設定</h3>

<label>API Key</label>
<input id="apiKey">

<label>System Prompt</label>
<textarea id="systemPrompt"></textarea>

<label>Model</label>
<input id="model">

<button onclick="saveSettings()">儲存</button>

<button onclick="exportChat()">匯出聊天</button>

<button onclick="closeSettings()">關閉</button>

</div>

</div>

<script>

const messagesEl=document.getElementById("messages")
const input=document.getElementById("user-input")
const sendBtn=document.getElementById("send-btn")
const cat=document.getElementById("thinking-cat")

let history=JSON.parse(localStorage.getItem("CHAT_HISTORY")||"[]")

function renderHistory(){
history.forEach(m=>{
addMsg(m.role,m.content,false)
})
}

function addMsg(role,text,save=true){

document.getElementById("empty")?.remove()

const div=document.createElement("div")

div.className="msg "+role

const avatar=role==="user"?"😼":"🐱"

div.innerHTML=
"<div>"+avatar+"</div>"+
"<div class='bubble'>"+text+"</div>"

messagesEl.appendChild(div)

messagesEl.scrollTop=messagesEl.scrollHeight

if(save){
history.push({role,content:text})
localStorage.setItem("CHAT_HISTORY",JSON.stringify(history))
}

}

async function send(){

const text=input.value.trim()

if(!text) return

addMsg("user",text)

input.value=""

sendBtn.textContent="🐾✨"

setTimeout(()=>sendBtn.textContent="🐾",200)

cat.classList.add("show")

const model=localStorage.getItem("MODEL")||"gpt-4o"

const messages=[
{role:"system",content:localStorage.getItem("SYSTEM_PROMPT")||""},
...history
]

const res=await fetch(
"https://api.openai.com/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("OPENAI_KEY")
},
body:JSON.stringify({
model,
messages
})
}
)

const data=await res.json()

cat.classList.remove("show")

const reply=data.choices?.[0]?.message?.content || "（沒有回應）"

addMsg("assistant",reply)

}

sendBtn.onclick=send

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
send()
}
})

function openSettings(){

document.getElementById("settingsModal").style.display="flex"

document.getElementById("apiKey").value=
localStorage.getItem("OPENAI_KEY")||""

document.getElementById("systemPrompt").value=
localStorage.getItem("SYSTEM_PROMPT")||""

document.getElementById("model").value=
localStorage.getItem("MODEL")||"gpt-4o"

}

function closeSettings(){
document.getElementById("settingsModal").style.display="none"
}

function saveSettings(){

localStorage.setItem(
"OPENAI_KEY",
document.getElementById("apiKey").value
)

localStorage.setItem(
"SYSTEM_PROMPT",
document.getElementById("systemPrompt").value
)

localStorage.setItem(
"MODEL",
document.getElementById("model").value
)

alert("設定已儲存")

}

function exportChat(){

const blob=new Blob(
[JSON.stringify(history,null,2)],
{type:"application/json"}
)

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="chat.json"

a.click()

}

let fontSize = localStorage.getItem("FONT_SIZE") || 16

document.body.style.fontSize=fontSize+"px"

function fontUp(){

fontSize++

applyFont()

}

function fontDown(){

fontSize--

applyFont()

}

function fontReset(){

fontSize=16

applyFont()

}

function applyFont(){

document.body.style.fontSize=fontSize+"px"

localStorage.setItem("FONT_SIZE",fontSize)

}

renderHistory()

</script>

</body>
</html>
