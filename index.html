<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🐈 whisper.ai</title>

<style>

:root{
--bg:#0b0b10;
--bubble-user:#8c7cff;
--bubble-ai:#2c2c3a;
--btn:#a594ff;
--accent:#c8bfff;
--divider:#2a2a35;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:system-ui;
}

body.pink{
--bg:#1a0f14;
--bubble-user:#ffb6d5;
--bubble-ai:#ffddee;
--btn:#ff9ac6;
--accent:#ffd1e6;
--divider:#3a2630;
}

#topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
border-bottom:1px solid var(--divider);
font-weight:bold;
}

#controls button{
margin-left:6px;
}

button{
background:linear-gradient(135deg,var(--btn),var(--accent));
border:none;
border-radius:12px;
padding:6px 10px;
cursor:pointer;
color:white;
}

#prompt-buttons{
padding:10px;
border-bottom:1px solid var(--divider);
}

#prompt-buttons button{
margin-right:6px;
}

#chat{
height:60vh;
overflow:auto;
padding:20px;
}

.msg{
margin:10px 0;
display:flex;
}

.msg.user{
justify-content:flex-end;
}

.bubble{
padding:12px 16px;
border-radius:16px;
max-width:60%;
}

.msg.user .bubble{
background:var(--bubble-user);
}

.msg.ai .bubble{
background:var(--bubble-ai);
}

#inputbar{
display:flex;
padding:12px;
border-top:1px solid var(--divider);
}

#input{
flex:1;
padding:10px;
border-radius:12px;
border:none;
}

#send{
margin-left:10px;
}

#prompt-editor{
width:100%;
height:80px;
margin-top:10px;
background:#1e1e2a;
color:white;
border:none;
padding:10px;
border-radius:10px;
}

#settings{
position:fixed;
right:20px;
top:70px;
background:#161622;
padding:20px;
border-radius:12px;
display:none;
width:300px;
}

</style>
</head>

<body>

<div id="topbar">

🐈 whisper.ai

<div id="controls">

<button onclick="setTheme('dark')">🌙</button>
<button onclick="setTheme('pink')">🧋</button>

<button onclick="fontDown()">A-</button>
<button onclick="fontReset()">A</button>
<button onclick="fontUp()">A+</button>

<button onclick="toggleSettings()">⚙️</button>

</div>

</div>

<div id="prompt-buttons"></div>

<div id="chat"></div>

<div id="inputbar">
<input id="input" placeholder="喵～說點什麼">
<button id="send">🐾</button>
</div>

<div id="settings">

<h3>編輯 Prompt</h3>

<textarea id="prompt-editor"></textarea>

<button onclick="savePrompt()">儲存</button>
<button onclick="clearChat()">清空聊天</button>
<button onclick="toggleSettings()">關閉</button>

</div>

<script>

const PROMPTS={
"劇場":"你是一個劇場型 AI，會加入動作與情緒描寫。",
"工程師":"你是一個冷靜工程師，回答精準。",
"吐槽":"你是一個毒舌 AI，喜歡吐槽。"
}

let SYSTEM_PROMPT=""

function buildPromptButtons(){

let box=document.getElementById("prompt-buttons")

for(let key in PROMPTS){

let b=document.createElement("button")
b.textContent=key
b.onclick=()=>selectPrompt(key)

box.appendChild(b)

}

}

function selectPrompt(name){

SYSTEM_PROMPT=PROMPTS[name]

document.getElementById("prompt-editor").value=SYSTEM_PROMPT

}

function savePrompt(){

SYSTEM_PROMPT=document.getElementById("prompt-editor").value
localStorage.setItem("prompt",SYSTEM_PROMPT)

}

function toggleSettings(){

let s=document.getElementById("settings")

s.style.display=s.style.display=="block"?"none":"block"

}

function clearChat(){

document.getElementById("chat").innerHTML=""

}

function addMessage(text,role){

let chat=document.getElementById("chat")

let m=document.createElement("div")
m.className="msg "+role

let b=document.createElement("div")
b.className="bubble"
b.textContent=text

m.appendChild(b)

chat.appendChild(m)

chat.scrollTop=chat.scrollHeight

}

document.getElementById("send").onclick=async()=>{

let input=document.getElementById("input")

let text=input.value

if(!text)return

addMessage(text,"user")

input.value=""

addMessage("🐈‍⬛💭 thinking...","ai")

}

function setTheme(name){

document.body.classList.remove("pink")

if(name=="pink")document.body.classList.add("pink")

localStorage.setItem("theme",name)

}

function loadTheme(){

let t=localStorage.getItem("theme")

if(t=="pink")document.body.classList.add("pink")

}

let fontSize=16

function fontUp(){

fontSize+=2
document.body.style.fontSize=fontSize+"px"

}

function fontDown(){

fontSize-=2
document.body.style.fontSize=fontSize+"px"

}

function fontReset(){

fontSize=16
document.body.style.fontSize="16px"

}

buildPromptButtons()
loadTheme()

</script>

</body>
</html>
