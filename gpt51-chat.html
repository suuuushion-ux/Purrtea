<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT-5.1 聊天</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181d;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #7c6af7;
    --accent-glow: rgba(124, 106, 247, 0.18);
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --user-bubble: #1e1b3a;
    --ai-bubble: #18181d;
    --radius: 14px;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 頂部設定列 */
  #setup-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #setup-bar label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  #api-key-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #api-key-input:focus { border-color: var(--accent); }

  #model-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  #model-select:focus { border-color: var(--accent); }

  #system-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 11px;
    padding: 7px 10px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    transition: all 0.2s;
  }
  #system-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* System prompt 摺疊區 */
  #system-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s;
    flex-shrink: 0;
  }
  #system-panel.open {
    max-height: 140px;
    padding: 10px 16px;
  }
  #system-prompt {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    height: 90px;
  }
  #system-prompt:focus { border-color: var(--accent); }

  /* 訊息區 */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-top: 2px;
  }
  .msg.user .avatar { background: var(--accent); }
  .msg.ai .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    max-width: min(75%, 560px);
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,106,247,0.25);
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* 打字中 */
  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,80%,100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* 輸入列 */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 140px;
    overflow-y: auto;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.3; cursor: default; }
  #send-btn svg { pointer-events: none; }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 42px;
    height: 42px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #clear-btn:hover { border-color: #e05a5a; color: #e05a5a; }

  /* 錯誤訊息 */
  .error-msg {
    color: #e05a5a;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 6px 15px;
    background: rgba(224,90,90,0.08);
    border-radius: 8px;
    border: 1px solid rgba(224,90,90,0.2);
  }

  /* 空狀態 */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.3;
    pointer-events: none;
    user-select: none;
  }
  #empty-state .icon { font-size: 36px; }
  #empty-state p { font-size: 13px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- 頂部設定列 -->
<div id="setup-bar">
  <label>API KEY</label>
  <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off" />
  <select id="model-select">
    <option value="gpt-5.1">gpt-5.1</option>
    <option value="gpt-4.1">gpt-4.1</option>
    <option value="gpt-4o">gpt-4o</option>
  </select>
  <button id="system-toggle">系統提示詞 ▾</button>
</div>

<!-- System prompt 面板 -->
<div id="system-panel">
  <textarea id="system-prompt" placeholder="在這裡輸入 system prompt，例如：你是溫柔自然、會接話的聊天夥伴，不說教，不念經。"></textarea>
</div>

<!-- 訊息區 -->
<div id="messages">
  <div id="empty-state">
    <div class="icon">💬</div>
    <p>輸入 API key 然後開始聊天</p>
  </div>
</div>

<!-- 輸入列 -->
<div id="input-bar">
  <textarea id="user-input" placeholder="說點什麼..." rows="1"></textarea>
  <button id="clear-btn" title="清除對話">🗑</button>
  <button id="send-btn" title="送出">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
  const apiKeyInput = document.getElementById('api-key-input');
  const modelSelect = document.getElementById('model-select');
  const systemToggle = document.getElementById('system-toggle');
  const systemPanel = document.getElementById('system-panel');
  const systemPrompt = document.getElementById('system-prompt');
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');

  let history = []; // { role, content }

  // System prompt 摺疊
  systemToggle.addEventListener('click', () => {
    systemPanel.classList.toggle('open');
    systemToggle.textContent = systemPanel.classList.contains('open') ? '系統提示詞 ▴' : '系統提示詞 ▾';
  });

  // textarea 自動高度
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });

  // Enter 送出（Shift+Enter 換行）
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  clearBtn.addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
  });

  function appendMsg(role, content) {
    if (emptyState.parentNode) emptyState.remove();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '🐾' : '✦'}</div>
      <div class="bubble">${escapeHtml(content)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function appendTyping() {
    if (emptyState.parentNode) emptyState.remove();
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `
      <div class="avatar">✦</div>
      <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function appendError(msg) {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `<div class="avatar">✦</div><div class="bubble error-msg">${escapeHtml(msg)}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    const key = apiKeyInput.value.trim();
    if (!key) { alert('請先貼入 API key 喵'); return; }

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    const typingEl = appendTyping();

    // 組裝 messages
    const messages = [];
    const sysText = systemPrompt.value.trim();
    if (sysText) messages.push({ role: 'system', content: sysText });
    messages.push(...history);

    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        },
        body: JSON.stringify({
          model: modelSelect.value,
          messages
        })
      });

      const data = await res.json();

      typingEl.remove();

      if (!res.ok) {
        const errMsg = data?.error?.message || `HTTP ${res.status}`;
        appendError('❌ ' + errMsg);
        history.pop(); // 回滾
      } else {
        const reply = data.choices?.[0]?.message?.content || '（沒有回應）';
        appendMsg('ai', reply);
        history.push({ role: 'assistant', content: reply });
      }
    } catch (err) {
      typingEl.remove();
      appendError('❌ 網路錯誤：' + err.message);
      history.pop();
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
